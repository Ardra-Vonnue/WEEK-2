<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive</title>
    <style>
      .nav {
        display: flex;
        flex-direction: column;
        row-gap: 25px;
        column-gap: 30px;
        background-color: beige;
        width: 150px;
        height: 400px;
        align-items: center;
        border: 1px solid black;
      }
      .nav1 {
        display: none;

        flex-direction: column;
        row-gap: 25px;
        column-gap: 30px;
        background-color: beige;
        width: 150px;
        height: 400px;
        align-items: center;
        border: 1px solid black;
      }
      @media screen and (min-width: 320px) {
        .label {
          display: none;
        }
      }
      @media screen and (min-width: 480px) {
        .label {
          display: inline-block;
        }
      }
      @media screen and (min-width: 768px) {
        .nav {
          display: flex;
          flex-direction: row;
          width: 100%;
          height: 150px;
        }
        .parent {
          flex-direction: column;
        }
      }
      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
      }
      .content {
        border: 1px solid black;
      }
      @media screen and (min-width: 320px) {
        .container {
          grid-template-columns: repeat(1, 4fr);
        }
      }
      @media screen and (min-width: 420px) {
        .container {
          grid-template-columns: repeat(2, 2fr);
        }
      }
      @media screen and (min-width: 900px) {
        .container {
          grid-template-columns: 300px 300px 300px;
        }
      }
      @media screen and (min-width: 1280px) {
        .container {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      @media screen and (min-width: 1024px) {
        .nav1 {
          display: flex;
          flex-direction: row;
          width: 100%;
          height: 150px;
        }
      }
      .parent {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="nav">
        <div class="icon1">
          <img
            src="https://img.icons8.com/?size=100&id=hUnyrtKvZdQU&format=png&color=000000"
            alt="random2"
            width="20px"
            height="20px"
          />
          <div class="label">Home</div>
        </div>

        <div class="icon2">
          <img
            src="https://img.icons8.com/?size=100&id=QTU7025DJRNb&format=png&color=000000"
            alt="random3"
            width="20px"
            height="20px"
          />
          <div class="label">About</div>
        </div>
        <div class="icon3">
          <img
            src="https://img.icons8.com/?size=100&id=123439&format=png&color=000000"
            alt="random3"
            width="20px"
            height="20px"
          />
          <div class="label">User</div>
        </div>
      </div>
      <div class="nav1">
        <div class="icon2">
          <img
            src="https://img.icons8.com/?size=100&id=hUnyrtKvZdQU&format=png&color=000000"
            alt="random2"
            width="20px"
            height="20px"
          />
          <div class="label">Home</div>
        </div>

        <div class="icon2">
          <img
            src="https://img.icons8.com/?size=100&id=QTU7025DJRNb&format=png&color=000000"
            alt="random3"
            width="20px"
            height="20px"
          />
          <div class="label">About</div>
        </div>
        <div class="icon3">
          <img
            src="https://img.icons8.com/?size=100&id=123439&format=png&color=000000"
            alt="random3"
            width="20px"
            height="20px"
          />
          <div class="label">User</div>
        </div>
      </div>
      <div class="container">
        <div class="content">content 1</div>
        <div class="content">content 2</div>
        <div class="content">content 3</div>
        <div class="content">content 4</div>
      </div>
    </div>
  </body>
</html>
