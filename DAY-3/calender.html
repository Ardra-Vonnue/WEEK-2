<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calender</title>
    <style>
        .days{
            
            display: grid;
            grid-template-columns: 60px repeat(8,1fr);
            border: 2px solid black;
           column-gap: 90px;
           }
        .day1{
            grid-column: 2;
        }
        .dates{
            grid-column: 2/-1;
            display: grid;
            grid-template-columns: repeat(8,1fr);
            
             column-gap: 3px;
             
             grid-auto-rows: 50px;
             grid-template-rows: repeat(5,50px);
           
        }
        .event{
            background-color: red;
        }
        .today{
            position:relative;
            display: inline-block;
           
            
            line-height: 40px;
        }
        .today::before{
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
           
            
            border: 2px solid #d60a7e;
            border-radius: 50%;
            transform: translate(-50%,-50%);
        }
        .first{
            grid-column: 1;
        }
        .week{
            display: grid;
            grid-template-rows: repeat(5,50px);
        }
        .container{
            display: grid;

        }
        @media screen and (width<480px) {
            .dates{
                grid-template-columns: 1fr;
            }
            .days{
                display: none;
            }
            .days1{
                display: none;
            }
            .first{
            grid-column: auto;
        }
        .day1{
            grid-column: auto;
        }

        }
        
    </style>
  </head>
  <body>
    <h1>June 2026</h1>
     <div class="container">
    <div class="days">
       <div class="week1">Week</div>
      <div class="monday">Monday</div>
      <div class="tuesday">Tuesday</div>
      <div class="wednesday">Wednesday</div>
      <div class="thursday">Thursday</div>
      <div class="friday">Friday</div>
      <div class="saturday">Saturday</div>
      <div class="sunday">Sunday</div>
    </div>
    <div class="dates">
    <div class="days1">1</div>
      <div class="day1">1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
      <div>7</div>
      <div class="days1">2</div>
      <div>8</div>
      <div>9</div>
      <div>10</div>
      <div>11</div>
      <div class="event">12</div>
      <div>13</div>
      <div>14</div>
      <div class="days1">3</div>
      <div class="today">15</div>
      <div>16</div>
      <div>17</div>
      <div>18</div>
      <div>19</div>
      <div>20</div>
      <div>21</div>
      <div class="days1">4</div>
      <div >22</div>
      <div>23</div>
      <div>24</div>
      <div>25</div>
      <div>26</div>
      <div>27</div>
      <div>28</div>
      <div class="days1">5</div>
      <div>29</div>
      <div class="event">30</div>
      <div>31</div>
    </div>
    </div>
  </body>
</html>
