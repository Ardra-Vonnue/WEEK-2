<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explicit</title>
    <style>
      .container1 {
        display: grid;
        grid-auto-flow: dense;
      }
      .container2 {
        display: grid;
        grid-template-columns: auto auto auto auto;
      }
      .container3 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-flow: dense;
        border: 2px solid black;
      }

      .item1 {
        display: grid;
        grid-column: 1/3;

        border: 2px solid black;
        background-color: burlywood;
      }
      .item2 {
        display: grid;
        grid-column: 1/2;
        grid-row: 2/3;
        border: 2px solid black;
        background-color: rgb(23, 121, 20);
      }
      .item3 {
        display: grid;

        grid-column: 2 / span 3;
        border: 2px solid black;
        background-color: rgb(44, 158, 224);
      }
      .item4 {
        display: grid;
        grid-column: 1/3;
        grid-row: 3/4;
        border: 2px solid black;
        background-color: rgb(23, 121, 20);
      }
      .item5 {
        display: grid;

        grid-column: 3 / span 2;
        border: 2px solid black;
        background-color: rgb(167, 171, 218);
      }
      .item6 {
        display: grid;

        grid-column: 3 / span 2;
        grid-row: 1/2;
        border: 2px solid black;
        background-color: rgb(228, 127, 219);
      }
      .item7 {
        display: grid;

        grid-row: 4/5;
        grid-column: 3 / span 2;
        border: 2px solid black;
        background-color: rgb(23, 121, 20);
      }
      .item8 {
        display: grid;

        grid-row: 4/5;
        grid-column: 1/3;
        border: 2px solid black;
        background-color: rgb(23, 121, 20);
      }
      .item11 {
        display: grid;
        grid-column: 1/-1;
        border: 2px solid black;
        background-color: burlywood;
      }
      .item21 {
        display: grid;
        grid-column: 2/4;
        grid-row: 2/3;
        border: 2px solid black;
        background-color: rgb(23, 121, 20);
      }
      .item31 {
        display: grid;
        grid-row: 2/4;
        grid-column: 1 / span 3;
        border: 2px solid black;
        background-color: rgb(44, 158, 224);
      }
      .item41 {
        display: grid;
        grid-column: 1/3;
        grid-row: 3/4;
        border: 2px solid black;
        background-color: rgb(23, 121, 20);
      }
      .item51 {
        display: grid;
        grid-row: 3/4;
        grid-column: 3 / span 2;
        border: 2px solid black;
        background-color: rgb(167, 171, 218);
      }
      .item61 {
        display: grid;

        grid-column: 3 / span 2;
        grid-row: 2/4;
        border: 2px solid black;
        background-color: rgb(228, 127, 219);
      }
      .item71 {
        display: grid;

        grid-row: 4/5;
        grid-column: 3 / span 2;
        border: 2px solid black;
        background-color: rgb(23, 121, 20);
      }
      .item81 {
        display: grid;

        grid-row: 4/5;
        grid-column: 1/3;
        border: 2px solid black;
        background-color: rgb(23, 121, 20);
      }
      .item12 {
        grid-row-start: 2;
        background-color: aquamarine;
      }
      .item22 {
        background-color: rgb(235, 193, 131);
      }
      .item32 {
        background-color: rgb(4, 77, 77);
      }
      .item42 {
        background-color: rgb(172, 158, 231);
        grid-column-start: 3;
      }
      .item52 {
        background-color: rgb(219, 194, 123);
      }
      .item62 {
        background-color: rgb(154, 230, 164);
      }
      .item72 {
        background-color: rgb(28, 51, 41);
      }
      .item82 {
        background-color: rgb(193, 147, 231);
      }
    </style>
  </head>
  <body>
    <main>
      <h2>grid-row and grid-column</h2>
      <div class="container1">
        <div class="item1">Item 1</div>
        <div class="item2">Item 2</div>
        <div class="item3">Item 3</div>
        <div class="item4">Item 4</div>
        <div class="item5">Item 5</div>
        <div class="item6">Item 6</div>
        <div class="item7">Item 7</div>
        <div class="item8">Item 8</div>
      </div>
      <h2>Negative Line Numbers</h2>
      <div class="container2">
        <div class="item11">Item 1</div>
        <div class="item21">Item 2</div>
        <div class="item31">Item 3</div>
        <div class="item41">Item 4</div>
        <div class="item51">Item 5</div>
        <div class="item61">Item 6</div>
        <div class="item71">Item 7</div>
        <div class="item81">Item 8</div>
      </div>
      <h2>Dense Packing</h2>
      <div class="container3">
        <div class="item12">Item 1</div>
        <div class="item22">Item 2</div>
        <div class="item32">Item 3</div>
        <div class="item42">Item 4</div>
        <div class="item52">Item 5</div>
        <div class="item62">Item 6</div>
        <div class="item72">Item 7</div>
        <div class="item82">Item 8</div>
      </div>
    </main>
  </body>
</html>
