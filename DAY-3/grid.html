<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
      .container1 {
        display: grid;
        grid-template-columns: 100px 300px 200px;
        border: 2px solid black;
        column-gap: 10px;
      }
      .container2 {
        display: grid;
        grid-template-columns: 20% 60% 20%;
        border: 2px solid black;
      }
      .container3 {
        display: grid;
        grid-template-columns: 1fr 2fr 1fr;
        border: 2px solid black;
      }
      .container4 {
        display: grid;
        grid-template-columns: auto auto auto;
        border: 2px solid black;
      }
      .container5 {
        display: grid;
        grid-template-columns: minmax(200px, 1fr);
        border: 2px solid black;
        gap: 30px;
      }
      .container6 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border: 2px solid black;
      }
      .container7 {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        border: 2px solid black;
      }
      .container8 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: minmax(100px, auto);
        row-gap: 10px;
        border: 2px solid black;
      }
      .border1 {
        border: 2px dotted black;
      }
    </style>
  </head>
  <body>
    <main>
      <h2>fixed px</h2>
      <div class="container1">
        <div class="border1">Item 1</div>
        <div class="border1">Item 2</div>
        <div class="border1">Item 3</div>
      </div>
      <h2>percentage</h2>
      <div class="container2">
        <div class="border1">Item 1</div>
        <div class="border1">Item 2</div>
        <div class="border1">Item 3</div>
      </div>
      <h2>fr units</h2>
      <div class="container3">
        <div class="border1">Item 1</div>
        <div class="border1">Item 2</div>
        <div class="border1">Item 3</div>
      </div>
      <h2>auto</h2>
      <div class="container4">
        <div class="border1">Item 1</div>
        <div class="border1">Item 2</div>
        <div class="border1">Item 3</div>
      </div>
      <h2>minmax</h2>
      <div class="container5">
        <div class="border1">Item 1</div>
        <div class="border1">Item 2</div>
        <div class="border1">Item 3</div>
      </div>
      <h2>repeat</h2>
      <div class="container6">
        <div class="border1">Item 1</div>
        <div class="border1">Item 2</div>
        <div class="border1">Item 3</div>
      </div>
      <h2>repeat(auto-fill,minmax())</h2>
      <div class="container7">
        <div class="border1">Item 1</div>
        <div class="border1">Item 2</div>
        <div class="border1">Item 3</div>
      </div>
      <h2>implicit grid</h2>
      <div class="container8">
        <div class="border1">Item 1</div>
        <div class="border1">Item 2</div>
        <div class="border1">Item 3</div>
        <div class="border1">Item 4</div>
        <div class="border1">Item 5</div>
        <div class="border1">Item 6</div>
        <div class="border1">Item 7</div>
      </div>
    </main>
  </body>
</html>
