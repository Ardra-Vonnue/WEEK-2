      <h1>Contact Details</h1>
      <div class="form5">
        <form>
          <div class="floating">
            <input type="text" id="name" class="required" required />
            <label for="name">Enter Name*:</label>
          </div>
          <div class="floating">
            <input type="email" id="mailId" class="required" required />
            <label for="mailId">Enter Mail ID*:</label>
          </div>

          <div class="floating">
            <input type="tel" id="phone" class="required" required />
            <label for="phone">Enter Mobile*:</label>
          </div>
          <div class="floating1">
            <label for="department">Enter Department:*</label>
            <select name="department" id="department" class="required" required>
              <option value="Human Resource">Human Resource</option>
              <option value="Finance">Finance</option>
              <option value="Technology">Technology</option>
              <option value="Media">Media</option>
            </select>
          </div>
          <div class="floating">
            <textarea id="comments"></textarea>
            <label for="comments">Enter your comments:</label>
          </div>
          <div class="floating1">
            <label for="newsLetter">Send News letter</label>
            <input
              type="checkbox"
              id="newsLetter"
              value="newsLetter"
              class="check5"
            />
          </div>

          <input type="submit" />
          <br />
          <br />
        </form>
